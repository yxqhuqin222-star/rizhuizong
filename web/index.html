<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>进度监控</title>
  <link rel="icon" type="image/png" href="./favicon.png?v=20260628-1">
  <link rel="shortcut icon" href="./favicon.ico?v=20260628-1">
  <link rel="stylesheet" href="./styles.css?v=20260628-4">
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="mark">日</div>
        <div>
          <h1>日追踪看板</h1>
        </div>
      </div>

      <nav class="nav">
        <a class="active" href="#overview">总览</a>
        <a href="#summary">最新期次明细</a>
        <a href="#export">导出</a>
      </nav>

      <div class="section">
        <h2>数据更新</h2>
        <div class="upload primary">
          <strong>demo 数据</strong>
          <div class="meta" id="demoInfo">读取中...</div>
          <button class="btn block primary" id="demoUploadButton">上传今日 demo</button>
          <div class="upload-status" id="demoUploadStatus" aria-live="polite"></div>
        </div>
        <div class="upload">
          <strong>target 目标</strong>
          <div class="meta" id="targetInfo">读取中...</div>
          <input id="targetFile" type="file" accept=".xlsx,.xls" hidden>
          <button class="btn block" id="targetUploadButton">更新 target</button>
          <div class="upload-status" id="targetUploadStatus" aria-live="polite"></div>
        </div>
        <small>上传后自动校验字段并重算 summary；看板默认切到每个学部的最新期次。</small>
      </div>

      <div class="section" id="export">
        <h2>导出</h2>
        <button class="btn block" id="exportLatest">导出最新期次</button>
        <button class="btn block" id="exportAll">导出完整 Summary</button>
        <button class="btn block" id="exportQuery">导出查询明细</button>
        <button class="btn block" id="naturalQueryButton">自然语言查询</button>
        <button class="btn block" id="reportPrimary">下载小学播报图</button>
        <button class="btn block" id="reportMiddle">下载初中播报图</button>
        <button class="btn block" id="reportHigh">下载高中播报图</button>
        <button class="btn block" id="reportLec1">下载1元占比图</button>
        <button class="btn block primary" id="broadcastPrimary">播报小学到钉钉</button>
        <button class="btn block primary" id="broadcastMiddle">播报初中到钉钉</button>
        <button class="btn block primary" id="broadcastHigh">播报高中到钉钉</button>
        <button class="btn block primary" id="broadcastLec1">播报1元占比到钉钉</button>
      </div>
    </aside>

    <main id="mainContent">
      <div class="topbar" id="overview">
        <div class="title">
          <h1>进度监控</h1>
        </div>
        <div class="actions">
          <button class="btn" id="showAllButton">查看全部期次</button>
          <button class="btn" id="downloadWorkbook">导出 Excel</button>
          <button class="btn primary" id="refreshButton">重新生成 Summary</button>
        </div>
      </div>

      <section class="panel natural-query-panel" id="naturalQueryPanel" hidden>
        <div class="panel-head">
          <div>
            <h2>自然语言查询</h2>
            <p>用一句话查询指定渠道在某个日期的进量。</p>
          </div>
          <button class="btn" id="closeNaturalQuery" type="button">返回进度监控</button>
        </div>

        <form class="natural-query-form" id="naturalQueryForm">
          <label for="naturalQueryInput">你想查询什么？</label>
          <div class="natural-query-compose">
            <input
              id="naturalQueryInput"
              autocomplete="off"
              placeholder="例如：6月27日YZY渠道的进量"
            >
            <button class="btn primary" id="naturalQuerySubmit" type="submit">开始查询</button>
          </div>
          <div class="natural-query-examples">
            <span>试试这样问：</span>
            <button type="button" data-query-example="YZY渠道的进量">YZY渠道的进量</button>
            <button type="button" data-query-example="6月27日YZY渠道的进量">6月27日YZY渠道的进量</button>
          </div>
        </form>

        <div class="query-clarification" id="queryClarification" hidden aria-live="polite">
          <span id="queryClarificationText"></span>
          <button class="btn" id="restartNaturalQuery" type="button">重新提问</button>
        </div>

        <div class="query-result" id="queryResult" hidden>
          <details class="query-interpretation" id="queryInterpretation">
            <summary>查看系统理解</summary>
            <div class="query-condition-list" id="queryConditionList"></div>
          </details>

          <div class="query-answer">
            <span>查询结论</span>
            <strong id="queryAnswer"></strong>
          </div>

          <div class="query-result-head">
            <div>
              <h3>查询明细</h3>
              <span id="queryPageSummary"></span>
            </div>
            <div class="query-result-actions">
              <label for="queryPageSize">每页</label>
              <select id="queryPageSize">
                <option value="10" selected>10 条</option>
                <option value="20">20 条</option>
                <option value="50">50 条</option>
              </select>
              <button class="btn" id="downloadQueryResult" type="button">导出全部明细</button>
            </div>
          </div>

          <div class="table-wrap query-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>下单日期</th>
                  <th>渠道名称</th>
                  <th>last_from</th>
                  <th>学部</th>
                  <th>期次</th>
                  <th>年级</th>
                  <th>渠道</th>
                  <th class="num">价体</th>
                  <th class="num">成单量</th>
                </tr>
              </thead>
              <tbody id="queryResultBody"></tbody>
            </table>
          </div>

          <div class="query-pagination">
            <button class="btn" id="queryPreviousPage" type="button">上一页</button>
            <div class="query-page-numbers" id="queryPageNumbers"></div>
            <button class="btn" id="queryNextPage" type="button">下一页</button>
          </div>
        </div>
      </section>

      <section class="metrics-panel" aria-label="各学部最新期次指标">
        <div class="metrics-table-wrap">
          <table class="metrics-table">
            <thead>
              <tr>
                <th>学部</th>
                <th>最新期次目标</th>
                <th>最新期次现状</th>
                <th>完成率</th>
                <th>平均进度</th>
                <th>落后项</th>
              </tr>
            </thead>
            <tbody id="departmentMetricsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="summary">
        <div class="panel-head">
          <h2 id="tableTitle">最新期次明细</h2>
          <div class="actions">
            <button class="btn" id="toggleScopeButton">切换到全部期次</button>
            <button class="btn" id="exportCurrent">导出当前视图</button>
          </div>
        </div>

        <div class="filters">
          <div class="field">
            <label>学部</label>
            <select id="filterDepartment"></select>
          </div>
          <div class="field">
            <label>期次</label>
            <select id="filterTerm"></select>
          </div>
          <div class="field">
            <label>渠道二级分类</label>
            <select id="filterChannel"></select>
          </div>
          <div class="field">
            <label>价体</label>
            <select id="filterPayment"></select>
          </div>
          <div class="field">
            <label>下单日期</label>
            <select id="filterOrderDate"></select>
          </div>
          <div class="field">
            <label>关键词</label>
            <input id="filterKeyword" placeholder="年级 / 渠道 / 期次">
          </div>
        </div>

        <div class="chips">
          <button class="chip active" data-chip="all" id="chipAll">最新期次</button>
          <button class="chip" data-chip="fast" id="chipFast">快</button>
          <button class="chip" data-chip="behind" id="chipBehind">落后进度</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>学部</th>
                <th>期次</th>
                <th>渠道</th>
                <th class="num">价体</th>
                <th>年级</th>
                <th>target_time</th>
                <th>下单日期</th>
                <th class="num">目标</th>
                <th class="num">现状</th>
                <th class="num">差距</th>
                <th class="num">完成率</th>
                <th class="num">进度</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="./app.js?v=20260628-4"></script>
</body>
</html>
